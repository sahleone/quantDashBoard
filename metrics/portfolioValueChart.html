                    label: 'Portfolio Value (Total)',
                    data: data.portfolioValue,
                    borderColor: 'rgb(54, 162, 235)',
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    yAxisID: 'y',
                });
            }

            // Create chart
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: `Portfolio Value Series: ${data.label}`,
                            font: {
                                size: 18
                            }
                        },
                        legend: {
                            display: true,
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + currency + ' ' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Date'
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                maxTicksLimit: 12
                            }
                        },
                        y: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Value (' + currency + ')'
                            },
                            ticks: {
                                callback: function(value) {
                                    return currency + ' ' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // Event listeners
        document.getElementById('accountSelect').addEventListener('change', updateChart);
        document.getElementById('showCash').addEventListener('change', updateChart);
        document.getElementById('showSecurities').addEventListener('change', updateChart);
        document.getElementById('showPortfolio').addEventListener('change', updateChart);

        // Initial chart
        updateChart();
    </script>
</body>
</html>
